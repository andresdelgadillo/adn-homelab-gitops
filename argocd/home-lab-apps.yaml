apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability
  namespace: argocd
spec:
  description: Project for Home Lab Apps
  

  sourceRepos:
    - '*'
    
  destinations:
    - server: 'https://kubernetes.default.svc'
      namespace: argocd
      
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-lab-apps
  namespace: argocd
spec:
  project: home-lab
  source:
    repoURL: 'git@github.com:andresdelgadillo/adn-homelab-gitops.git'
    targetRevision: main
    path: argocd/applications/home-lab
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
