apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: observability
  sources:
    - repoURL: 'https://grafana.github.io/helm-charts'
      chart: grafana
      targetRevision: 10.5.15
      helm:
        valueFiles:
          - $values/argocd/configurations/observability/grafana/values.yaml
          
    - repoURL: 'https://github.com/andresdelgadillo/adn-homelab-gitops.git'
      targetRevision: main
      ref: values

    - repoURL: 'https://github.com/andresdelgadillo/adn-homelab-gitops.git'
      targetRevision: main
      path: argocd/configurations/observability/grafana
      directory:
        exclude: '{values.yaml,*.md}'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true