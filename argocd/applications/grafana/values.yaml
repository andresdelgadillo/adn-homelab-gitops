admin:
  existingSecret: "grafana-admin-credentials"
  userKey: "admin-user"
  passwordKey: "admin-password"

initChownData:
  enabled: false

livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 10
readinessProbe:
  initialDelaySeconds: 30
  periodSeconds: 10

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "128Mi"

persistence:
  enabled: true
  storageClassName: "local-path"
  size: 2Gi 

ingress:
  enabled: true
  ingressClassName: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod-cloudflare"
  hosts:
    - grafana.aldn.link
  path: /
  pathType: Prefix
  tls:
    - secretName: grafana-tls-secret
      hosts:
        - grafana.aldn.link

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        type: prometheus
        url: http://victoriametrics-server.observability.svc.cluster.local:8428
        access: proxy
        isDefault: true
      - name: Loki
        type: loki
        url: http://loki.observability.svc.cluster.local:3100
        access: proxy