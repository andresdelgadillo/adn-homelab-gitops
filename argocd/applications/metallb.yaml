apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://metallb.github.io/metallb'
      chart: metallb
      targetRevision: 0.16.1
      helm:
        valueFiles:
          - $values/argocd/configurations/metallb/values.yaml
          
    - repoURL: 'git@github.com:andresdelgadillo/adn-homelab-gitops.git'
      targetRevision: main
      ref: values

    - repoURL: 'git@github.com:andresdelgadillo/adn-homelab-gitops.git'
      targetRevision: main
      path: argocd/configurations/metallb
      directory:
        exclude: '{values.yaml,*.md}'
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: metallb-system 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true