apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoriametrics
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://victoriametrics.github.io/helm-charts/'
      chart: victoria-metrics-single
      targetRevision: 0.13.0
      helm:
        valueFiles:
          - $values/argocd/applications/victoriametrics/values.yaml
          
    - repoURL: 'https://github.com/andresdelgadillo/adn-homelab-gitops.git'
      targetRevision: main
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: observability 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true