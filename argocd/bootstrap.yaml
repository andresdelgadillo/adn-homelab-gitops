apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-management-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/andresdelgadillo/adn-homelab-gitops.git'
    targetRevision: HEAD
    path: applications
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
