apiVersion: v1
kind: Service
metadata:
  name: transmission-service
  namespace: transmission
spec:
  type: NodePort
  selector:
    app: transmission
  ports:
    - name: web-ui
      protocol: TCP
      port: 9091
      targetPort: 9091
      nodePort: 30091   # LAN Access Port
    - name: peer-tcp
      protocol: TCP
      port: 51413
      targetPort: 51413
      nodePort: 31413
    - name: peer-udp
      protocol: UDP
      port: 51413
      targetPort: 51413
      nodePort: 31413