apiVersion: v1
kind: Service
metadata:
  name: samba-internal-service
  namespace: samba
spec:
  type: LoadBalancer
  selector:
    app: samba
  ports:
  - name: samba-137-udp
    protocol: UDP
    port: 137
    targetPort: 137
  - name: samba-138-udp
    protocol: UDP
    port: 138
    targetPort: 138
  - name: samba-139-tcp
    protocol: TCP
    port: 139
    targetPort: 139
  - name: samba-445-tcp
    protocol: TCP
    port: 445
    targetPort: 445
  - name: samba-445-udp
    protocol: UDP
    port: 445
    targetPort: 445